<div class="countdown" id="cd"></div>
<script>
const target = new Date("2026-05-08");
function update(){
let now=new Date();
let diff=target-now;
let d=Math.floor(diff/(1000*60*60*24));
document.getElementById("cd").innerText="Trip in "+d+" days";
}
setInterval(update,1000);
update();
</script>
